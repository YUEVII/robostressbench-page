name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Resolve build output
        run: |
          for dir in .output/public dist build; do
            if [ -f "$dir/index.html" ]; then
              echo "PAGES_OUTPUT_DIR=$dir" >> "$GITHUB_ENV"
              echo "Using build output: $dir"
              exit 0
            fi
          done
          echo "Could not find index.html in known build output directories."
          echo "Repository root:"
          ls -la
          echo ".output:"
          ls -la .output || true
          echo "dist:"
          ls -la dist || true
          exit 1

      - name: Create SPA fallback
        run: cp "$PAGES_OUTPUT_DIR/index.html" "$PAGES_OUTPUT_DIR/404.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_OUTPUT_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
